  return '<div style="flex:1;text-align:center;padding:10px 6px;background:var(--color-bg);border-radius:var(--radius-md);border:0.5px solid var(--color-border)">'
    + '<p style="font-size:18px;font-weight:500">' + val + '</p>'
    + '<p style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">' + label + '</p>'
    + '</div>';
}

// =============================================================
// REHAB SCREEN
// =============================================================

function rRehabCard(label, timing, subval, done) {
  var checkBtn = done
    ? '<div style="width:36px;height:36px;border-radius:50%;background:var(--color-text);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-check" style="font-size:18px;color:var(--color-bg)"></i></div>'
    : '<i class="ti ti-chevron-right" style="font-size:18px;color:var(--color-text-tertiary);flex-shrink:0"></i>';
  return '<div style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer' + (done ? ';opacity:0.65' : '') + '" onclick="goRehab()">'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<div style="width:40px;height:40px;border-radius:50%;background:var(--color-bg-warning);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
    + '<i class="ti ti-activity" style="font-size:20px;color:var(--color-text-warning)"></i></div>'
    + '<div style="flex:1">'
    + '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:2px">Rehab · ' + timing + '</p>'
    + '<p style="font-size:16px;font-weight:500">' + label + '</p>'
    + (subval ? '<p style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">' + subval + '</p>' : '')
    + '</div>'
    + checkBtn
    + '</div></div>';
}

function rRehab() {
  var tp  = APP.todayPlan;
  var rawLabel = tp.rehab_exercise;
  var ps  = APP.planState;
  var cfg = APP.planConfig;
  var suppressedPlyo = ps.in_deload && cfg.deload_suppress_plyo &&
    rawLabel.toLowerCase().indexOf('plyo') !== -1;
  if (suppressedPlyo) rawLabel = '5×45s Isometric Knee Pre-Load (plyo suppressed)';

  var ex = rehabMatchExercise(rawLabel);
  var rehabLogged = APP.todayLog && APP.todayLog.rehab_completed;
  var allSetsComplete = ex.sets
    ? APP.rehabSetsCompleted.length >= ex.sets && APP.rehabSetsCompleted.slice(0, ex.sets).every(Boolean)
    : false;

  var html = '<div style="padding-top:12px">'
    + '<button onclick="APP.screen=\'today\';render()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:16px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
    + '<div style="width:40px;height:40px;border-radius:50%;background:var(--color-bg-warning);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
    + '<i class="ti ti-activity" style="font-size:20px;color:var(--color-text-warning)"></i></div>'
    + '<div>'
    + '<p style="font-size:12px;color:var(--color-text-secondary)">Rehab · ' + tp.rehab_timing.replace(/_/g, ' ') + '</p>'
    + '<h1 style="font-size:20px;font-weight:600;line-height:1.25">' + rawLabel + '</h1>'
    + '</div></div>';

  if (suppressedPlyo) {
    html += '<div style="padding:10px 14px;background:var(--color-bg-warning);border-radius:var(--radius-md);margin:10px 0;font-size:12px;color:var(--color-text-warning)">'
      + '<i class="ti ti-alert-triangle" style="margin-right:6px"></i>Plyometrics suppressed during deload — substituted with isometric hold.</div>';
  }

  // ---- FORM TIPS ----
  if (ex.tips && ex.tips.length) {
    html += '<details style="margin:14px 0" open>'
      + '<summary style="font-size:13px;font-weight:500;cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--color-bg-secondary);border-radius:var(--radius-md)">'
      + '<i class="ti ti-bulb" style="color:var(--color-text-warning);font-size:14px"></i>Form tips</summary>'
      + '<div style="padding:10px 4px 0">';
    ex.tips.forEach(function(tip, i) {
      html += '<div style="display:flex;gap:10px;padding:8px 0;' + (i < ex.tips.length - 1 ? 'border-bottom:0.5px solid var(--color-border)' : '') + '">'
        + '<span style="font-size:11px;font-weight:600;color:var(--color-text-warning);flex-shrink:0;padding-top:1px">' + (i + 1) + '</span>'
        + '<p style="font-size:13px;color:var(--color-text-secondary);line-height:1.5">' + tip + '</p>'
        + '</div>';
    });
    html += '</div></details>';
  }

  // ---- TIMED SETS (isometric) ----
  if (ex.type === 'timed') {
    html += '<p style="font-size:13px;font-weight:500;margin-bottom:10px">' + ex.label + '</p>';

    // Set circles
    html += '<div style="display:flex;gap:8px;margin-bottom:20px">';
    for (var s = 0; s < ex.sets; s++) {
      var isDone   = APP.rehabSetsCompleted[s] === true;
      var isActive = !isDone && s === APP.rehabActiveSet;
      var isPast   = s < APP.rehabActiveSet && !isDone;
      var circleBg = isDone ? 'var(--color-text-success)' : isActive ? 'var(--color-text-warning)' : 'var(--color-bg-secondary)';
      var circleColor = (isDone || isActive) ? 'var(--color-bg)' : 'var(--color-text-tertiary)';
      var circleLabel = isDone ? '<i class="ti ti-check" style="font-size:14px"></i>' : (s + 1);
      html += '<div style="flex:1;height:44px;border-radius:var(--radius-md);background:' + circleBg + ';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:' + circleColor + ';border:0.5px solid ' + (isActive ? 'var(--color-text-warning)' : 'var(--color-border)') + '">' + circleLabel + '</div>';
    }
    html += '</div>';

    // Timer display for active set
    var activeSetDone = APP.rehabSetsCompleted[APP.rehabActiveSet] === true;
    if (!activeSetDone && APP.rehabActiveSet < ex.sets) {
      var timerVal = fmt(APP.rehabTimerRemaining);
      html += '<div style="text-align:center;margin-bottom:20px">'
        + '<div id="rehab-timer-display" style="font-size:64px;font-weight:200;letter-spacing:-2px;line-height:1">' + timerVal + '</div>'
        + '<p style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px">Set ' + (APP.rehabActiveSet + 1) + ' of ' + ex.sets + '</p>'
        + '</div>';

      if (APP.rehabTimerActive) {
        html += '<button onclick="rehabTimerPause()" style="width:100%;padding:14px;border-radius:var(--radius-md);background:var(--color-bg-secondary);color:var(--color-text);border:0.5px solid var(--color-border);font-size:16px;font-weight:500;margin-bottom:10px">Pause</button>';
      } else {
        html += '<button onclick="rehabTimerStart()" style="width:100%;padding:14px;border-radius:var(--radius-md);background:var(--color-text-warning);color:var(--color-bg);border:none;font-size:16px;font-weight:500;margin-bottom:10px">'
          + (APP.rehabTimerRemaining < ex.duration ? 'Resume' : 'Start set ' + (APP.rehabActiveSet + 1)) + '</button>';
        if (APP.rehabTimerRemaining < ex.duration) {
          html += '<button onclick="rehabTimerSkip()" style="width:100%;padding:12px;border-radius:var(--radius-md);background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border);font-size:14px;margin-bottom:10px">Mark set done</button>';
        }
      }
    }

    if (allSetsComplete) {
      html += rRehabCompleteButton(rehabLogged);
    }
  }

  // ---- WEIGHTED SETS (band walks, step-downs) ----
  else if (ex.type === 'weighted') {
    // Weight adjuster
    var w = APP.rehabWeight;
    html += '<div style="margin-bottom:16px">'
      + '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Weight</p>'
      + '<div style="display:flex;align-items:center;gap:0;border:0.5px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden">'
      + '<button onclick="rehabWeightAdj(-' + ex.increment + ')" style="padding:12px 20px;background:var(--color-bg-secondary);border:none;font-size:20px;color:var(--color-text);min-width:56px">−</button>'
      + '<div style="flex:1;text-align:center;padding:12px 8px">'
      + '<span style="font-size:24px;font-weight:500">' + w + '</span>'
      + '<span style="font-size:13px;color:var(--color-text-secondary);margin-left:4px">lbs</span>'
      + '</div>'
      + '<button onclick="rehabWeightAdj(' + ex.increment + ')" style="padding:12px 20px;background:var(--color-bg-secondary);border:none;font-size:20px;color:var(--color-text);min-width:56px">+</button>'
      + '</div></div>';

    // Set tracker
    html += '<p style="font-size:13px;font-weight:500;margin-bottom:10px">' + ex.label + '</p>';
    html += '<div style="display:flex;gap:8px;margin-bottom:16px">';
    for (var s2 = 0; s2 < ex.sets; s2++) {
      var s2Done = APP.rehabSetsCompleted[s2] === true;
      var s2Active = !s2Done && s2 === APP.rehabSetsCompleted.filter(Boolean).length;
      html += '<div style="flex:1;height:44px;border-radius:var(--radius-md);background:' + (s2Done ? 'var(--color-text-success)' : s2Active ? 'var(--color-bg-secondary)' : 'var(--color-bg-secondary)') + ';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:' + (s2Done ? 'var(--color-bg)' : 'var(--color-text-tertiary)') + ';border:0.5px solid ' + (s2Active ? 'var(--color-border-md)' : 'var(--color-border)') + ';opacity:' + (s2Done || s2Active ? '1' : '0.4') + '">'
        + (s2Done ? '<i class="ti ti-check" style="font-size:14px"></i>' : (s2Active ? ex.reps + ' reps' : (s2 + 1)))
        + '</div>';
    }
    html += '</div>';

    var completedCount = APP.rehabSetsCompleted.filter(Boolean).length;
    if (completedCount < ex.sets) {
      html += '<button onclick="rehabLogSet()" style="width:100%;padding:14px;border-radius:var(--radius-md);background:var(--color-text-warning);color:var(--color-bg);border:none;font-size:16px;font-weight:500;margin-bottom:10px">Log set ' + (completedCount + 1) + ' · ' + ex.reps + ' reps</button>';
    }

    if (allSetsComplete) {
      html += rRehabCompleteButton(rehabLogged);
    }
  }

  // ---- FREE (form tips + complete) ----
  else {
    if (ex.sets) {
      html += '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">' + ex.label + '</p>';
    }
    html += rRehabCompleteButton(rehabLogged);
  }

  html += '</div>';
  return html;
}

function rRehabCompleteButton(done) {
  if (done) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--color-bg-secondary);border-radius:var(--radius-md);margin-top:8px">'
      + '<i class="ti ti-circle-check" style="font-size:20px;color:var(--color-text-success)"></i>'
      + '<p style="font-size:15px;font-weight:500">Rehab complete</p>'
      + '<button onclick="toggleRehab()" style="margin-left:auto;padding:6px 14px;border-radius:var(--radius-md);background:transparent;border:0.5px solid var(--color-border);font-size:12px;color:var(--color-text-secondary)">Undo</button>'
      + '</div>';
  }
  return '<button onclick="rehabMarkComplete()" style="width:100%;padding:14px;border-radius:var(--radius-md);background:var(--color-text);color:var(--color-bg);border:none;font-size:16px;font-weight:500;margin-top:8px">Mark complete</button>';
}

// =============================================================
// CALENDAR SCREEN
// =============================================================

function rCalendar() {
  var year  = APP.calViewYear;
  var month = APP.calViewMonth;
  var today = APP.today;
  var pad   = function(n) { return n < 10 ? '0' + n : '' + n; };
  var monthNames = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];

  var html = '<div style="padding-top:12px">'
    + '<button onclick="APP.screen=\'today\';render()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:16px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    + '<h1 style="font-size:24px">Calendar</h1>'
    + '<div style="display:flex;align-items:center;gap:2px">'
    + '<button onclick="calNav(-1)" style="width:34px;height:34px;border-radius:50%;border:0.5px solid var(--color-border);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--color-text)"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>'
    + '<span style="font-size:13px;font-weight:500;min-width:116px;text-align:center">' + monthNames[month] + ' ' + year + '</span>'
    + '<button onclick="calNav(1)" style="width:34px;height:34px;border-radius:50%;border:0.5px solid var(--color-border);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--color-text)"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>'
    + '</div></div>';

  if (APP.calLoading) {
    html += '<div style="text-align:center;padding:60px 0;color:var(--color-text-secondary)"><i class="ti ti-loader" style="font-size:28px"></i></div></div>';
    return html;
  }

  // Build lookup maps
  var logMap = {};
  APP.calLogs.forEach(function(l) { logMap[l.log_date] = l; });
  var sessionMap = {};
  APP.calSessions.forEach(function(s) {
    var d = new Date(s.completed_at);
    var ds = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    if (!sessionMap[ds]) sessionMap[ds] = [];
    sessionMap[ds].push(s);
  });

  // Day-of-week header row
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">'
    + ['S','M','T','W','T','F','S'].map(function(h) {
      return '<div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);padding:4px 0;font-weight:500">' + h + '</div>';
    }).join('') + '</div>';

  var firstDay    = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();

  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';

  for (var b = 0; b < firstDay; b++) html += '<div></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr  = year + '-' + pad(month + 1) + '-' + pad(d);
    var isToday  = dateStr === today;
    var isFuture = dateStr > today;
    var log      = logMap[dateStr];
    var sessions = sessionMap[dateStr] || [];
    var isSel    = APP.calSelectedDate === dateStr;
    var hasLift  = sessions.length > 0;
    var hasRun   = log && log.run_completed;
    var hasRehab = log && log.rehab_completed;
    var pain     = log ? log.knee_pain_level : null;

    var cellBg = 'var(--color-bg)';
    if (!isFuture && pain !== null) {
      if      (pain >= 4) cellBg = 'var(--color-bg-danger)';
      else if (pain === 3) cellBg = 'var(--color-bg-warning)';
      else                 cellBg = 'var(--color-bg-success)';
    }

    var bw  = (isSel || isToday) ? '1.5px' : '0.5px';
    var bc  = isSel ? 'var(--color-text)' : isToday ? 'var(--color-text-info)' : 'var(--color-border)';
    var opa = isFuture ? 'opacity:0.35;' : '';
    var clickable = !isFuture && (log || hasLift);
    var onclick = clickable ? 'onclick="calSelectDate(\'' + dateStr + '\')"' : '';

    html += '<div ' + onclick + ' style="' + opa + 'background:' + cellBg + ';border:' + bw + ' solid ' + bc + ';border-radius:var(--radius-md);padding:5px 3px 6px;min-height:52px;display:flex;flex-direction:column;align-items:center;' + (clickable ? 'cursor:pointer' : '') + '">'
      + '<span style="font-size:12px;font-weight:' + (isToday ? '700' : '400') + ';color:' + (isToday ? 'var(--color-text-info)' : 'var(--color-text)') + '">' + d + '</span>';

    if (!isFuture && (hasLift || hasRun || hasRehab)) {
      html += '<div style="display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;justify-content:center">';
      if (hasLift)  html += '<span style="width:8px;height:8px;border-radius:50%;background:var(--color-text-success);flex-shrink:0;box-shadow:0 0 0 1.5px rgba(0,0,0,0.25)"></span>';
      if (hasRun)   html += '<span style="width:8px;height:8px;border-radius:50%;background:var(--color-text-info);flex-shrink:0;box-shadow:0 0 0 1.5px rgba(0,0,0,0.25)"></span>';
      if (hasRehab) html += '<span style="width:8px;height:8px;border-radius:50%;background:var(--color-text-warning);flex-shrink:0;box-shadow:0 0 0 1.5px rgba(0,0,0,0.25)"></span>';
      html += '</div>';
    } else if (!isFuture && log) {
      html += '<div style="margin-top:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--color-text-tertiary);display:inline-block;box-shadow:0 0 0 1.5px rgba(0,0,0,0.25)"></span></div>';
    }

    html += '</div>';
  }

  html += '</div>';

  // Legend
  html += '<div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">'
    + rCalLegendDot('var(--color-text-success)', 'Lift')
    + rCalLegendDot('var(--color-text-info)',    'Run')
    + rCalLegendDot('var(--color-text-warning)', 'Rehab')
    + '</div>';

  // Selected day detail
  if (APP.calSelectedDate) {
    html += rCalDayDetail(APP.calSelectedDate, logMap[APP.calSelectedDate], sessionMap[APP.calSelectedDate] || []);
  }

  // Upcoming queue
  html += rCalUpcoming();

  html += '</div>';
  return html;
}

function rCalLegendDot(color, label) {
  return '<span style="font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:5px">'
    + '<span style="width:10px;height:10px;border-radius:50%;background:' + color + ';display:inline-block;flex-shrink:0;box-shadow:0 0 0 1.5px rgba(0,0,0,0.2)"></span>'
    + label + '</span>';
}

function rCalDayDetail(dateStr, log, sessions) {
  var d = new Date(dateStr + 'T12:00:00');
  var label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  var html = '<div style="margin-top:14px;padding:14px;background:var(--color-bg-secondary);border-radius:var(--radius-lg)">'
    + '<p style="font-size:13px;font-weight:500;margin-bottom:10px">' + label + '</p>';

  if (log) {
    var pc = log.knee_pain_level >= 4 ? 'var(--color-text-danger)'
           : log.knee_pain_level === 3 ? 'var(--color-text-warning)' : 'var(--color-text-success)';
    html += rCalDetailRow('ti-clipboard-check', pc,
      'Pain ' + log.knee_pain_level + '/5' + (log.joint_fullness ? ' · Swelling' : ''));
    if (log.run_completed)   html += rCalDetailRow('ti-run',      'var(--color-text-info)',    'Run completed');
    if (log.rehab_completed) html += rCalDetailRow('ti-activity', 'var(--color-text-warning)', 'Rehab completed');
    if (log.plan_phase) {
      html += '<p style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">Phase ' + log.plan_phase + ' · Cycle day ' + log.plan_cycle_day + '</p>';
    }
  }

  sessions.forEach(function(s) {
    html += rCalDetailRow('ti-barbell', 'var(--color-text-success)', 'Day ' + s.gym_day + ' lift completed');
  });

  if (!log && sessions.length === 0) {
    html += '<p style="font-size:13px;color:var(--color-text-tertiary)">No activities logged.</p>';
  }

  html += '</div>';
  return html;
}

function rCalDetailRow(icon, color, text) {
  return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
    + '<i class="ti ' + icon + '" style="font-size:14px;color:' + color + ';flex-shrink:0"></i>'
    + '<span style="font-size:13px;color:' + color + '">' + text + '</span></div>';
}

function rCalUpcoming() {
  if (!APP.calUpcoming || APP.calUpcoming.length === 0) return '';

  var html = '<div style="margin-top:24px">'
    + '<p style="font-size:13px;font-weight:500;margin-bottom:2px">Coming up</p>'
    + '<p style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:12px">Next sessions in planned order — dates depend on when you train</p>';

  var nextGymDay = APP.planState ? APP.planState.current_gym_day : 1;
  APP.calUpcoming.forEach(function(day, i) {
    var rows = [];
    if (day.is_lift_day) {
      rows.push({ icon: 'ti-barbell',  col: 'var(--color-text-success)', text: 'Lift ' + nextGymDay });
      nextGymDay = (nextGymDay % 3) + 1;
    }
    if (day.run_miles) {
      var rt = 'Run ' + day.run_miles + ' mi';
      if (day.run_notes) rt += ' — ' + day.run_notes;
      rows.push({ icon: 'ti-run', col: 'var(--color-text-info)', text: rt });
    }
    if (day.rehab_timing) {
      rows.push({ icon: 'ti-activity', col: 'var(--color-text-warning)',
        text: 'Rehab (' + day.rehab_timing.replace(/_/g, ' ') + ')' });
    }

    html += '<div style="display:flex;gap:10px;padding:10px 0;'
      + (i < APP.calUpcoming.length - 1 ? 'border-bottom:0.5px solid var(--color-border)' : '') + '">'
      + '<span style="font-size:11px;background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:3px 8px;white-space:nowrap;color:var(--color-text-secondary);font-weight:500;flex-shrink:0;margin-top:1px">Day ' + day.day_number + '</span>'
      + '<div style="flex:1">'
      + rows.map(function(r) {
          return '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'
            + '<i class="ti ' + r.icon + '" style="font-size:12px;color:' + r.col + ';flex-shrink:0"></i>'
            + '<span style="font-size:13px">' + r.text + '</span></div>';
        }).join('')
      + '</div></div>';
  });

  html += '</div>';
  return html;
}

// =============================================================
// CHECK-IN SCREEN
// =============================================================

function rCheckin() {
  var existing = APP.todayLog;
  var pain = APP.ciPain !== null ? APP.ciPain : (existing ? existing.knee_pain_level : null);
  var swell = APP.ciSwelling !== false ? APP.ciSwelling : (existing ? !!existing.joint_fullness : false);

  var descriptors = [
    '1 — Noticed at most, no effect, gone by morning',
    '2 — Mild, some awareness but no effect on movement',
    '3 — Felt during/after, settled within 24h',
    '4 — Changed how you moved or ran',
    '5 — Lingered to this morning'
  ];

  var html = '<div style="padding-top:12px">'
    + '<button onclick="APP.screen=\'today\';render()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:20px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>'
    + '<h1 style="font-size:24px;margin-bottom:4px">Morning check-in</h1>'
    + '<p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:24px">How\'s the knee since yesterday?</p>'

    // Pain selector
    + '<p style="font-size:13px;font-weight:500;margin-bottom:10px">Knee pain level</p>'
    + '<div style="display:flex;gap:6px;margin-bottom:12px">'
    + [1,2,3,4,5].map(function(n) {
      var sel = pain === n ? ' selected' : '';
      return '<button class="pain-btn' + sel + '" onclick="selectPain(' + n + ')">' + n + '</button>';
    }).join('')
    + '</div>';

  // Descriptor for selected pain
  if (pain !== null) {
    html += '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:20px;padding:8px 12px;background:var(--color-bg-secondary);border-radius:var(--radius-md)">'
      + descriptors[pain - 1] + '</p>';
  } else {
    html += '<div style="height:20px"></div>';
  }

  // Swelling toggle
  html += '<p style="font-size:13px;font-weight:500;margin-bottom:8px">Patellar sweep test</p>'
    + '<button onclick="toggleSwelling()" style="width:100%;padding:16px;border-radius:var(--radius-lg);border:0.5px solid ' + (swell ? 'var(--color-text-danger)' : 'var(--color-border-md)') + ';background:' + (swell ? 'var(--color-bg-danger)' : 'var(--color-bg-secondary)') + ';font-size:15px;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:24px">'
    + '<i class="ti ' + (swell ? 'ti-droplet-filled' : 'ti-droplet') + '" style="font-size:20px;color:' + (swell ? 'var(--color-text-danger)' : 'var(--color-text-secondary)') + '"></i>'
    + '<div><p style="font-size:14px;font-weight:500;color:' + (swell ? 'var(--color-text-danger)' : 'var(--color-text)') + '">' + (swell ? 'Swelling present' : 'No swelling') + '</p>'
    + '<p style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">Fluid wave when you press alongside the kneecap?</p></div>'
    + '</button>';

  // Save button
  var canSave = pain !== null;
  html += '<button onclick="saveCheckin()" ' + (canSave ? '' : 'disabled') + ' style="width:100%;padding:18px;background:' + (canSave ? 'var(--color-text)' : 'var(--color-bg-tertiary)') + ';color:' + (canSave ? 'var(--color-bg)' : 'var(--color-text-tertiary)') + ';border:none;border-radius:var(--radius-lg);font-size:16px;font-weight:500;' + (canSave ? '' : 'cursor:not-allowed') + '">Save check-in</button>'
    + '</div>';

  return html;
}

// =============================================================
// WORKOUT SCREEN
// =============================================================

function rWorkout() {
  var ps = APP.planState;
  var exercises = APP.exercises;
  var mainExercises = exercises.filter(function(e) { return !e.is_optional; });
  var finishers    = exercises.filter(function(e) { return e.is_optional; });

  // Group by day_order for superset display
  var byOrder = {};
  mainExercises.forEach(function(e) {
    if (!byOrder[e.day_order]) byOrder[e.day_order] = [];
    byOrder[e.day_order].push(e);
  });

  var html = '<div style="padding-top:12px">'
    + '<button onclick="APP.screen=\'today\';render()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:16px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>';

  if (ps.in_deload) {
    html += '<div class="deload-banner" style="margin-bottom:14px"><i class="ti ti-alert-triangle" style="margin-right:6px"></i>Deload mode — loads frozen, no plyometrics</div>';
  }

  html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
    + '<span style="font-size:13px;color:var(--color-text-secondary)">Day ' + APP.planState.current_gym_day + ' workout</span>'
    + '<span style="font-size:13px;color:var(--color-text-secondary)">Phase ' + ps.current_phase + '</span></div>'
    + '<h1 style="font-size:24px;margin-bottom:20px">Exercises</h1>';

  // Render each exercise group
  var globalIdx = 0;
  Object.keys(byOrder).sort(function(a,b){ return a-b; }).forEach(function(order) {
    var group = byOrder[order];
    var isSuperset = group.length > 1;

    if (isSuperset) {
      html += rSupersetGroup(group, globalIdx);
      globalIdx += group.length;
    } else {
      html += rExerciseRow(group[0], globalIdx, mainExercises.length);
      globalIdx++;
    }
  });

  // Finishers section
  if (finishers.length > 0) {
    html += '<p style="font-size:12px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-top:20px;margin-bottom:10px">Optional finishers</p>';
    finishers.forEach(function(ex, i) {
      html += rExerciseRow(ex, mainExercises.length + i, exercises.length);
    });
  }

  html += '</div>';
  return html;
}

function rExerciseRow(ex, idx, total) {
  var st = ex.state;
  var isActive = (idx === APP.exIndex);
  var isDone   = (idx < APP.exIndex) || (idx === APP.exIndex && APP.setLogged[0] && APP.setLogged[1] && APP.setLogged[2]);
  var isPending = idx > APP.exIndex;

  var bg   = isDone   ? 'var(--color-bg-success)'   : isActive ? 'var(--color-bg-secondary)' : 'var(--color-bg)';
  var bdr  = isDone   ? 'var(--color-text-success)'  : isActive ? 'var(--color-border-md)'    : 'var(--color-border)';
  var opa  = isPending ? ';opacity:0.45' : '';

  var weights = ex.is_bodyweight ? null : [st.set1_weight, st.set2_weight, st.set3_weight];
  var weightStr = weights ? weights.join(' / ') + ' lbs' : 'Bodyweight';

  var hint = progressionHint(ex);

  var html = '<div style="background:' + bg + ';border:0.5px solid ' + bdr + ';border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px' + opa + '" onclick="' + (isActive ? 'goLogSet(0,' + idx + ')' : '') + '">'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<div style="flex:1">'
    + '<p style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px">Exercise ' + (idx+1) + ' of ' + total + (ex.is_optional ? ' · optional' : '') + '</p>'
    + '<p style="font-size:16px;font-weight:500">' + ex.name + '</p>'
    + '<p style="font-size:12px;color:var(--color-text-secondary);margin-top:3px">' + weightStr + ' · 3×' + ex.goal_reps + ' reps</p>'
    + '</div>';

  if (isDone) {
    html += '<i class="ti ti-circle-check" style="font-size:24px;color:var(--color-text-success);flex-shrink:0"></i>';
  } else if (isActive && ex.is_optional) {
    html += '<div style="display:flex;gap:6px;flex-shrink:0">'
      + '<button onclick="event.stopPropagation();skipWholeExercise(' + idx + ',\'skipped\')" style="padding:10px 14px;border-radius:var(--radius-md);background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-md);font-size:14px">Skip</button>'
      + '<button onclick="event.stopPropagation();goLogSet(0,' + idx + ')" style="padding:10px 18px;border-radius:var(--radius-md);background:var(--color-text);color:var(--color-bg);border:none;font-size:14px;font-weight:500">Start</button>'
      + '</div>';
  } else if (isActive) {
    html += '<div style="display:flex;gap:6px;flex-shrink:0">'
      + '<button onclick="event.stopPropagation();showSkipExerciseMenu(' + idx + ')" style="padding:10px 14px;border-radius:var(--radius-md);background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-md);font-size:14px">Skip…</button>'
      + '<button onclick="event.stopPropagation();goLogSet(0,' + idx + ')" style="padding:10px 18px;border-radius:var(--radius-md);background:var(--color-text);color:var(--color-bg);border:none;font-size:14px;font-weight:500">Start</button>'
      + '</div>';
  }

  html += '</div>';

  if (ex.form_cue && isActive) {
    html += '<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border);font-size:12px;color:var(--color-text-secondary)">'
      + '<i class="ti ti-bulb" style="font-size:12px;margin-right:4px"></i>' + ex.form_cue + '</div>';
  }

  if (hint && isActive) {
    html += '<div style="margin-top:6px;font-size:11px;color:var(--color-text-tertiary)">'
      + '<i class="ti ti-trending-up" style="font-size:11px;margin-right:4px"></i>' + hint + '</div>';
  }

  html += '</div>';
  return html;
}

function rSupersetGroup(group, startIdx) {
  var anchor = group.find(function(e) { return e.is_superset_anchor; }) || group[0];
  var anchorWeight = anchor.state.set1_weight; // sets share weight in superset

  var html = '<div style="border:0.5px solid var(--color-border-md);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;background:var(--color-bg-secondary)">'
    + '<p style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">Superset · ' + anchorWeight + ' lbs</p>';

  group.forEach(function(ex, i) {
    html += '<div style="padding:8px 0;' + (i < group.length-1 ? 'border-bottom:0.5px solid var(--color-border)' : '') + '">'
      + '<p style="font-size:15px;font-weight:500">' + ex.name + '</p>'
      + '<p style="font-size:12px;color:var(--color-text-secondary)">' + ex.goal_reps + ' reps</p>'
      + '</div>';
  });

  // Use anchor exercise for the log button
  html += '<button onclick="goLogSet(0,' + startIdx + ')" style="width:100%;margin-top:10px;padding:12px;background:var(--color-text);color:var(--color-bg);border:none;border-radius:var(--radius-md);font-size:14px;font-weight:500">Start superset</button>';
  html += '</div>';
  return html;
}

// =============================================================
// LOG SET SCREEN
// =============================================================

function rLogSet() {
  var ex = APP.exercises[APP.exIndex];
  var setIdx = APP.pendingSet; // 0-based
  var st = ex.state;
  var weight = ex.is_bodyweight ? null :
    [st.set1_weight, st.set2_weight, st.set3_weight][setIdx];
  var restLabel = setIdx === 0 ? '60s' : '3 min';

  // Already logged sets mini-summary
  var doneHtml = '';
  for (var i = 0; i < setIdx; i++) {
    if (APP.setLogged[i]) {
      var lr = APP.loggedSkipped[i]
        ? '<span style="color:var(--color-text-secondary)">skipped</span>'
        : APP.loggedReps[i] + ' reps';
      doneHtml += '<p style="font-size:13px;color:var(--color-text-success);margin-bottom:4px"><i class="ti ti-check"></i> Set ' + (i+1) + ' · ' + lr + '</p>';
    }
  }

  var html = '<div style="padding-top:12px">'
    + '<button onclick="APP.screen=\'workout\';render()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:20px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>'
    + (doneHtml ? '<div style="margin-bottom:16px">' + doneHtml + '</div>' : '')
    + '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:2px">Set ' + (setIdx+1) + ' of 3 · ' + ex.name + '</p>'
    + '<h1 style="font-size:26px;margin-bottom:28px">' + (weight ? weight + ' lbs' : 'Bodyweight') + '</h1>'
    + '<div style="background:var(--color-bg-secondary);border-radius:var(--radius-lg);padding:36px 20px;text-align:center;margin-bottom:28px">'
    + '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Reps</p>'
    + '<div id="rn" style="font-size:64px;font-weight:500;line-height:1;margin-bottom:20px">' + APP.pendingReps + '</div>'
    + '<div style="display:flex;justify-content:center;align-items:center;gap:24px">'
    + '<button onclick="adj(-1)" style="width:48px;height:48px;border-radius:50%;border:0.5px solid var(--color-border-md);background:var(--color-bg);font-size:22px;display:flex;align-items:center;justify-content:center" aria-label="fewer reps"><i class="ti ti-minus"></i></button>'
    + '<span style="font-size:12px;color:var(--color-text-tertiary)">adjust</span>'
    + '<button onclick="adj(1)" style="width:48px;height:48px;border-radius:50%;border:0.5px solid var(--color-border-md);background:var(--color-bg);font-size:22px;display:flex;align-items:center;justify-content:center" aria-label="more reps"><i class="ti ti-plus"></i></button>'
    + '</div></div>'
    + '<button onclick="doLogSet()" id="lb" style="width:100%;padding:20px;background:var(--color-text);color:var(--color-bg);border:none;border-radius:var(--radius-lg);font-size:18px;font-weight:500;margin-bottom:10px">Done · ' + APP.pendingReps + ' reps</button>'
    + (setIdx < 2 ? '<p style="text-align:center;font-size:12px;color:var(--color-text-tertiary)">→ ' + restLabel + ' rest starts after</p>' : '')
    + (setIdx === 2 && !ex.is_optional && !ex.is_bodyweight
      ? (function() {
          var hint = progressionHint(ex);
          if (APP.readiness === 'amber' && isKneeLoading(ex)) {
            return '<p style="text-align:center;font-size:13px;color:var(--color-text-warning);margin-top:10px">Amber — knee load held flat today</p>';
          }
          var confirmed = APP.progressionReady;
          var label = confirmed ? 'Confirmed — ' + hint : (hint || 'Confirm progression');
          return '<button onclick="toggleProgressionReady()" style="width:100%;padding:14px;border-radius:var(--radius-md);border:0.5px solid ' + (confirmed ? 'var(--color-text-success)' : 'var(--color-border)') + ';background:' + (confirmed ? 'var(--color-bg-success,#0d2b1a)' : 'transparent') + ';color:' + (confirmed ? 'var(--color-text-success)' : 'var(--color-text-secondary)') + ';font-size:14px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px">'
            + '<i class="ti ti-' + (confirmed ? 'circle-check-filled' : 'circle-check') + '" style="font-size:16px"></i>'
            + label
            + '</button>';
        })()
      : '')
    + '<button onclick="showSkipMenu()" style="width:100%;padding:12px;background:transparent;border:none;color:var(--color-text-secondary);font-size:14px;margin-top:8px">Skip this set…</button>'
    + '</div>';

  return html;
}

// =============================================================
// REST TIMER SCREEN
// =============================================================

function rRest() {
  var ex = APP.exercises[APP.exIndex];
  var setIdx = APP.pendingSet;
  var nextSetIdx = setIdx + 1;
  var st = ex.state;
  var nextWeight = ex.is_bodyweight ? null :
    [st.set1_weight, st.set2_weight, st.set3_weight][nextSetIdx];

  var html = '<div style="padding-top:12px">'
    + '<button onclick="skipRest()" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;color:var(--color-text-secondary);font-size:14px;margin-bottom:12px"><i class="ti ti-arrow-left" style="font-size:16px"></i> Back</button>'
    + (APP.loggedSkipped[setIdx]
       ? '<p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:4px"><i class="ti ti-forward-skip"></i> Set ' + (setIdx+1) + ' skipped</p>'
       : '<p style="font-size:14px;color:var(--color-text-success);margin-bottom:4px"><i class="ti ti-check"></i> Set ' + (setIdx+1) + ' done · ' + APP.loggedReps[setIdx] + ' reps</p>'
      )
    + '<div style="text-align:center;padding:48px 20px 36px">'
    + '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">' + (setIdx === 0 ? 'Short rest' : 'Full rest') + '</p>'
    + '<div id="tn" style="font-size:60px;font-weight:500;letter-spacing:-2px;line-height:1">' + fmt(APP.timerRemaining) + '</div>'
    + '<p style="font-size:13px;color:var(--color-text-tertiary);margin-top:12px">until set ' + (nextSetIdx+1) + '</p>'
    + '</div>'
    + '<div style="background:var(--color-bg-secondary);border-radius:var(--radius-lg);padding:18px;text-align:center;margin-bottom:20px">'
    + '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">Next — Set ' + (nextSetIdx+1) + '</p>'
    + '<p style="font-size:24px;font-weight:500">'
    + (nextWeight ? nextWeight + ' lbs' : 'Bodyweight')
    + ' <span style="font-size:15px;font-weight:400;color:var(--color-text-secondary)">· ' + ex.goal_reps + ' reps</span></p>'
    + '</div>'
    + '<button onclick="skipRest()" style="width:100%;padding:12px;background:transparent;border:0.5px solid var(--color-border-md);border-radius:var(--radius-md);font-size:14px;color:var(--color-text-secondary)">Skip rest</button>'
    + '</div>';

  return html;
}

// =============================================================
// ACTIONS
// =============================================================

function goCheckin() {
  // Pre-populate form if already checked in today
  if (APP.todayLog) {
    APP.ciPain    = APP.todayLog.knee_pain_level;
    APP.ciSwelling = !!APP.todayLog.joint_fullness;
  } else {
    APP.ciPain    = null;
    APP.ciSwelling = false;
  }
  APP.screen = 'checkin';
  render();
}

function selectPain(n) {
  APP.ciPain = n;
  render();
}

function toggleSwelling() {
  APP.ciSwelling = !APP.ciSwelling;
  render();
}

async function saveCheckin() {
  if (APP.ciPain === null) return;
  try {
    await saveDailyLog(APP.ciPain, APP.ciSwelling);
    await evaluateFlare(APP.ciPain, APP.ciSwelling);
    await refreshReadiness();
    APP.screen = 'today';
    render();
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

async function startWorkout() {
  await requestNotificationPermission();
  if (!APP.sessionId) {
    try {
      await createSession(APP.planState.current_gym_day);
    } catch (e) {
      alert('Could not start session: ' + e.message);
      return;
    }
  }
  APP.exIndex    = 0;
  APP.setLogged  = [false, false, false];
  APP.loggedReps = [null, null, null];
  APP.loggedSkipped = [false, false, false];
  APP.skipReasons   = [null, null, null];
  APP.progressionReady = false;
  APP.screen = 'workout';
  render();
}

function goLogSet(setIdx, exIdx) {
  APP.exIndex    = exIdx;
  APP.pendingSet = setIdx;
  APP.pendingReps = APP.exercises[exIdx].goal_reps;
  APP.screen = 'log_set';
  render();
}

function adj(d) {
  APP.pendingReps = Math.max(1, APP.pendingReps + d);
  var e = document.getElementById('rn');
  if (e) e.textContent = APP.pendingReps;
  var b = document.getElementById('lb');
  if (b) b.textContent = 'Done · ' + APP.pendingReps + ' reps';
}

async function doLogSet() {
  var ex = APP.exercises[APP.exIndex];
  var setIdx = APP.pendingSet;
  var st = ex.state;
  var weight = [st.set1_weight, st.set2_weight, st.set3_weight][setIdx];

  APP.setLogged[setIdx]  = true;
  APP.loggedReps[setIdx] = APP.pendingReps;
  APP.loggedSkipped[setIdx] = false;

  try {
    await logSessionSet(ex.id, setIdx+1, weight, ex.goal_reps, APP.pendingReps, ex.is_bodyweight, 'completed', null);
  } catch(e) {
    console.error('Log set error:', e);
  }

  if (setIdx < 2) {
    // Start rest timer
    APP.timerRemaining = setIdx === 0 ? (ex.rest_short_seconds || 60) : (ex.rest_long_seconds || 180);
    APP.timerEndTime = Date.now() + APP.timerRemaining * 1000;
    APP.timerActive = true;
    scheduleTimerNotification(APP.timerEndTime, 'Set ' + (setIdx + 2), ex.name);
    APP.screen = 'rest';
    render();
  } else {
    // All 3 sets done — run progression, advance
    await finishExercise(ex);
  }
}

async function doSkipSet(reason) {
  var ex = APP.exercises[APP.exIndex];
  var setIdx = APP.pendingSet;
  var st = ex.state;
  var weight = [st.set1_weight, st.set2_weight, st.set3_weight][setIdx];

  APP.setLogged[setIdx]     = true;
  APP.loggedReps[setIdx]    = null;
  APP.loggedSkipped[setIdx] = true;
  APP.skipReasons[setIdx]   = reason;

  try {
    await logSessionSet(ex.id, setIdx+1, weight, ex.goal_reps, null, ex.is_bodyweight, 'skipped', reason);
  } catch(e) {
    console.error('Skip set error:', e);
  }

  if (reason === 'niggle') {
    await markNiggleFlare();
  }

  if (setIdx < 2) {
    APP.timerRemaining = setIdx === 0 ? (ex.rest_short_seconds || 60) : (ex.rest_long_seconds || 180);
    APP.timerEndTime = Date.now() + APP.timerRemaining * 1000;
    APP.timerActive = true;
    scheduleTimerNotification(APP.timerEndTime, 'Set ' + (setIdx + 2), ex.name);
    APP.screen = 'rest';
    render();
  } else {
    await finishExercise(ex);
  }
}

async function finishExercise(ex) {
  // Run progression engine (handles skips internally)
  var progressionReady = APP.progressionReady;
  APP.progressionReady = false;
  var setsData = [0,1,2].map(function(i) {
    return { reps: APP.loggedReps[i], skipped: APP.loggedSkipped[i], progressionReady: progressionReady && i === 2 };
  });
  await runProgressionEngine(ex, setsData);

  // Advance to next exercise
  var mainExercises = APP.exercises.filter(function(e) { return !e.is_optional; });
  var nextIdx = APP.exIndex + 1;

  if (nextIdx < APP.exercises.length) {
    APP.exIndex = nextIdx;
    APP.setLogged  = [false, false, false];
    APP.loggedReps = [null, null, null];
    APP.loggedSkipped = [false, false, false];
    APP.skipReasons   = [null, null, null];
    APP.screen = 'workout';
    render();
  } else {
    // Session complete
    await finishSession();
  }
}

async function finishSession() {
  try {
    await completeSession();
    // Defer the day-advance until tomorrow so today's dashboard stays on today's plan.
    // loadBootData() will apply this when APP.today > pending.date.
    var nextGymDay = (APP.planState.current_gym_day % 3) + 1;
    localStorage.setItem('lift_advance_pending', JSON.stringify({
      date: APP.today,
      nextGymDay: nextGymDay
    }));
  } catch(e) {
    console.error('Finish session error:', e);
  }

  APP.sessionId = null;
  APP.liftCompletedToday = true;
  APP.screen = 'today';
  render();
}

function skipRest() {
  APP.timerActive = false;
  APP.timerEndTime = null;
  cancelTimerNotification();
  APP.screen = 'log_set';
  APP.pendingSet = APP.pendingSet + 1;
  APP.pendingReps = APP.exercises[APP.exIndex].goal_reps;
  render();
}

function showSkipMenu() {
  var overlay = document.createElement('div');
  overlay.id = 'skip-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100';
  overlay.innerHTML = '<div style="background:var(--color-bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px;width:100%;max-width:430px">'
    + '<p style="font-size:16px;font-weight:500;margin-bottom:16px">Skip reason</p>'
    + '<button onclick="closeSkipMenu();doSkipSet(\'niggle\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:8px;display:flex;gap:10px;align-items:center"><i class="ti ti-alert-circle" style="color:var(--color-text-danger)"></i>Niggle / pain — protecting the joint</button>'
    + '<button onclick="closeSkipMenu();doSkipSet(\'travel_equipment\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:8px;display:flex;gap:10px;align-items:center"><i class="ti ti-luggage" style="color:var(--color-text-secondary)"></i>Travel / no equipment</button>'
    + '<button onclick="closeSkipMenu();doSkipSet(\'other\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:16px;display:flex;gap:10px;align-items:center"><i class="ti ti-dots" style="color:var(--color-text-secondary)"></i>Other</button>'
    + '<button onclick="closeSkipMenu()" style="width:100%;padding:14px;border:none;background:transparent;font-size:14px;color:var(--color-text-secondary)">Cancel</button>'
    + '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(ev) { if (ev.target === overlay) closeSkipMenu(); });
}

function closeSkipMenu() {
  var el = document.getElementById('skip-overlay');
  if (el) el.remove();
}

function showSkipExerciseMenu(idx) {
  var ex = APP.exercises[idx];
  var overlay = document.createElement('div');
  overlay.id = 'skip-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100';
  overlay.innerHTML = '<div style="background:var(--color-bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px;width:100%;max-width:430px">'
    + '<p style="font-size:16px;font-weight:500;margin-bottom:4px">Skip ' + ex.name + '?</p>'
    + '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">All 3 sets will be logged as skipped</p>'
    + '<button onclick="closeSkipMenu();skipWholeExercise(' + idx + ',\'niggle\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:8px;display:flex;gap:10px;align-items:center"><i class="ti ti-alert-circle" style="color:var(--color-text-danger)"></i>Niggle / pain — protecting the joint</button>'
    + '<button onclick="closeSkipMenu();skipWholeExercise(' + idx + ',\'travel_equipment\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:8px;display:flex;gap:10px;align-items:center"><i class="ti ti-luggage" style="color:var(--color-text-secondary)"></i>Travel / no equipment</button>'
    + '<button onclick="closeSkipMenu();skipWholeExercise(' + idx + ',\'other\')" style="width:100%;padding:16px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-size:15px;text-align:left;margin-bottom:16px;display:flex;gap:10px;align-items:center"><i class="ti ti-dots" style="color:var(--color-text-secondary)"></i>Other</button>'
    + '<button onclick="closeSkipMenu()" style="width:100%;padding:14px;border:none;background:transparent;font-size:14px;color:var(--color-text-secondary)">Cancel</button>'
    + '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(ev) { if (ev.target === overlay) closeSkipMenu(); });
}

async function skipWholeExercise(idx, reason) {
  APP.exIndex          = idx;
  APP.setLogged        = [false, false, false];
  APP.loggedReps       = [null, null, null];
  APP.loggedSkipped    = [true, true, true];
  APP.skipReasons      = [reason, reason, reason];
  APP.progressionReady = false;

  var ex = APP.exercises[idx];
  var st = ex.state;

  for (var i = 0; i < 3; i++) {
    var weight = ex.is_bodyweight ? null : [st.set1_weight, st.set2_weight, st.set3_weight][i];
    try {
      await logSessionSet(ex.id, i + 1, weight, ex.goal_reps, null, ex.is_bodyweight, 'skipped', reason);
    } catch(e) {
      console.error('Skip exercise log error:', e);
    }
  }

  if (reason === 'niggle') {
    await markNiggleFlare();
  }

  await finishExercise(ex);
}

function toggleProgressionReady() {
  APP.progressionReady = !APP.progressionReady;
  render();
}

async function toggleRun() {
  if (!APP.todayLog) { goCheckin(); return; }
  var newVal = !APP.todayLog.run_completed;
  var { error } = await db.from('daily_log')
    .update({ run_completed: newVal })
    .eq('log_date', APP.today);
  if (!error) APP.todayLog.run_completed = newVal;
  render();
}

async function toggleRehab() {
  if (!APP.todayLog) { goCheckin(); return; }
  var newVal = !APP.todayLog.rehab_completed;
  var { error } = await db.from('daily_log')
    .update({ rehab_completed: newVal })
    .eq('log_date', APP.today);
  if (!error) APP.todayLog.rehab_completed = newVal;
  render();
}

function goRehab() {
  if (!APP.todayLog) { goCheckin(); return; }
  // Init set state for this exercise
  var ex = rehabMatchExercise(APP.todayPlan.rehab_exercise);
  var numSets = ex.sets || 0;
  if (APP.rehabSetsCompleted.length !== numSets) {
    APP.rehabSetsCompleted = [];
    for (var i = 0; i < numSets; i++) APP.rehabSetsCompleted.push(false);
  }
  var prevActive = APP.rehabActiveSet;
  APP.rehabActiveSet = APP.rehabSetsCompleted.indexOf(false);
  if (APP.rehabActiveSet < 0) APP.rehabActiveSet = numSets - 1;
  if (ex.type === 'timed') {
    // Reset timer only if we moved to a new set (not returning mid-hold)
    if (APP.rehabActiveSet !== prevActive || APP.rehabTimerRemaining <= 0) {
      APP.rehabTimerRemaining = ex.duration;
    }
    APP.rehabTimerActive = false; // always pause on re-entry
  }
  // Load saved weight for weighted exercises
  if (ex.type === 'weighted' && ex.weightKey) {
    var saved = localStorage.getItem(ex.weightKey);
    APP.rehabWeight = saved !== null ? parseInt(saved, 10) : ex.defaultWeight;
  }
  APP.screen = 'rehab';
  render();
}

function rehabTimerStart() {
  APP.rehabTimerActive = true;
  render();
}

function rehabTimerPause() {
  APP.rehabTimerActive = false;
  clearInterval(APP.timerInterval);
  APP.timerInterval = null;
  render();
}

function rehabTimerSkip() {
  var ex = rehabMatchExercise(APP.todayPlan.rehab_exercise);
  APP.rehabTimerActive = false;
  clearInterval(APP.timerInterval);
  APP.timerInterval = null;
  APP.rehabSetsCompleted[APP.rehabActiveSet] = true;
  var next = APP.rehabActiveSet + 1;
  if (next < ex.sets) {
    APP.rehabActiveSet = next;
    APP.rehabTimerRemaining = ex.duration;
  }
  render();
}

function rehabWeightAdj(delta) {
  var ex = rehabMatchExercise(APP.todayPlan.rehab_exercise);
  APP.rehabWeight = Math.max(0, APP.rehabWeight + delta);
  if (ex.weightKey) localStorage.setItem(ex.weightKey, APP.rehabWeight);
  render();
}

function rehabLogSet() {
  var completedCount = APP.rehabSetsCompleted.filter(Boolean).length;
  if (completedCount < APP.rehabSetsCompleted.length) {
    APP.rehabSetsCompleted[completedCount] = true;
    var ex = rehabMatchExercise(APP.todayPlan.rehab_exercise);
    if (ex.weightKey) localStorage.setItem(ex.weightKey, APP.rehabWeight);
  }
  render();
}

async function rehabMarkComplete() {
  if (!APP.todayLog) return;
  var { error } = await db.from('daily_log')
    .update({ rehab_completed: true })
    .eq('log_date', APP.today);
  if (!error) APP.todayLog.rehab_completed = true;
  render();
}

async function goCalendar() {
  var now = new Date();
  APP.calViewYear     = now.getFullYear();
  APP.calViewMonth    = now.getMonth();
  APP.calSelectedDate = null;
  APP.calLoading      = true;
  APP.screen = 'calendar';
  render();
  try {
    await loadCalendarData(APP.calViewYear, APP.calViewMonth);
  } catch(e) {
    console.error('Calendar load error:', e);
  }
  APP.calLoading = false;
  render();
}

async function calNav(dir) {
  var m = APP.calViewMonth + dir;
  var y = APP.calViewYear;
  if (m < 0)  { m = 11; y--; }
  if (m > 11) { m = 0;  y++; }
  APP.calViewMonth    = m;
  APP.calViewYear     = y;
  APP.calSelectedDate = null;
  APP.calLoading      = true;
  render();
  try {
    await loadCalendarData(y, m);
  } catch(e) {
    console.error('Calendar nav error:', e);
  }
  APP.calLoading = false;
  render();
}

function calSelectDate(dateStr) {
  APP.calSelectedDate = APP.calSelectedDate === dateStr ? null : dateStr;
  render();
}

// =============================================================
// UTILITIES
// =============================================================

function ensureAudioCtx() {
  if (!APP.audioCtx) {
    try {
      APP.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return null; }
  }
  if (APP.audioCtx.state === 'suspended') {
    APP.audioCtx.resume();
  }
  return APP.audioCtx;
}

function playTimerDone() {
  var ctx = ensureAudioCtx();
  if (!ctx) return;
  try {
    // Three ascending beeps
    [0, 0.25, 0.5].forEach(function(delay, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 440 + i * 110; // 440 → 550 → 660 Hz
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.2);
    });
  } catch(e) {}
}

// Warm up AudioContext on first touch so it's ready when the timer fires
document.addEventListener('touchstart', function warmAudio() {
  ensureAudioCtx();
  document.removeEventListener('touchstart', warmAudio);
}, { once: true });

// When app returns to foreground, recalculate timer from end timestamp
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState !== 'visible') return;
  if (!APP.timerActive || !APP.timerEndTime) return;
  APP.timerRemaining = Math.max(0, Math.round((APP.timerEndTime - Date.now()) / 1000));
  // If timer already expired while in background, fire immediately
  if (APP.timerRemaining <= 0) {
    clearInterval(APP.timerInterval);
    APP.timerInterval = null;
    APP.timerActive = false;
    APP.timerEndTime = null;
    cancelTimerNotification();
    playTimerDone();
    APP.pendingSet = APP.pendingSet + 1;
    APP.pendingReps = APP.exercises[APP.exIndex].goal_reps;
    APP.screen = 'log_set';
    render();
  } else {
    // Re-sync the display; render() will restart the interval
    render();
  }
});

function fmt(s) {
  var m = Math.floor(s / 60), r = s % 60;
  return m > 0 ? m + ':' + (r < 10 ? '0' : '') + r : s + 's';
}

// =============================================================
// SERVICE WORKER + NOTIFICATIONS
// =============================================================

var SW_REG = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(function(reg) {
    SW_REG = reg;
  }).catch(function(e) {
    console.warn('SW registration failed:', e);
  });
}

function swPost(msg) {
  if (!SW_REG) return;
  var sw = SW_REG.active || SW_REG.installing || SW_REG.waiting;
  if (sw) sw.postMessage(msg);
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function scheduleTimerNotification(endTime, nextSetLabel, exerciseName) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  swPost({
    type: 'SCHEDULE_TIMER',
    endTime: endTime,
    title: 'Rest over — ' + exerciseName,
    body: 'Time for ' + nextSetLabel
  });
}

function cancelTimerNotification() {
  swPost({ type: 'CANCEL_TIMER' });
}

// =============================================================
// BOOT
// =============================================================
loadBootData();
</script>
