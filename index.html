<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lift</title>
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Lift">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f4;
      --color-bg-tertiary: #eeece8;
      --color-bg-success: #eaf3de;
      --color-bg-info: #e6f1fb;
      --color-bg-warning: #faeeda;
      --color-bg-danger: #fde8e8;
      --color-border: rgba(0,0,0,0.12);
      --color-border-md: rgba(0,0,0,0.25);
      --color-text: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-success: #3b6d11;
      --color-text-info: #185fa5;
      --color-text-warning: #854f0b;
      --color-text-danger: #9b1c1c;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #262624;
        --color-bg-tertiary: #2c2c2a;
        --color-bg-success: #17340a;
        --color-bg-info: #042c53;
        --color-bg-warning: #412402;
        --color-bg-danger: #3b0a0a;
        --color-border: rgba(255,255,255,0.12);
        --color-border-md: rgba(255,255,255,0.25);
        --color-text: #f1efe8;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-success: #c0dd97;
        --color-text-info: #b5d4f4;
        --color-text-warning: #fac775;
        --color-text-danger: #fca5a5;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    #app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
    }

    #screen {
      padding: 8px 16px 48px;
    }

    button { font-family: inherit; cursor: pointer; }
    p { margin: 0; }
    h1 { font-weight: 500; }

    /* Pain selector buttons */
    .pain-btn {
      flex: 1;
      padding: 14px 4px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: var(--color-bg-secondary);
      font-size: 22px;
      font-weight: 600;
      color: var(--color-text);
      text-align: center;
      transition: background 0.1s;
    }
    .pain-btn.selected {
      background: var(--color-text);
      color: var(--color-bg);
      border-color: var(--color-text);
    }

    /* Readiness pill */
    .readiness-green { background: var(--color-bg-success); color: var(--color-text-success); }
    .readiness-amber { background: var(--color-bg-warning); color: var(--color-text-warning); }
    .readiness-red   { background: var(--color-bg-danger);  color: var(--color-text-danger); }

    /* Loading / error states */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 12px;
      color: var(--color-text-secondary); font-size: 15px;
    }

    /* Deload banner */
    .deload-banner {
      background: var(--color-bg-warning);
      border: 0.5px solid var(--color-text-warning);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--color-text-warning);
    }
  </style>
</head>
<body>

<div id="app">
  <div id="screen"><div class="loading-wrap"><i class="ti ti-loader" style="font-size:28px"></i><span>Loading…</span></div></div>
</div>

<script>

// =============================================================
// APP STATE
// =============================================================
var APP = {
  // Screen IDs:
  //  'today'       — home / today view
  //  'checkin'     — morning check-in
  //  'workout'     — exercise list for the day
  //  'log_set'     — log a single set

  rehabWeight:        0     // loaded from localStorage per exercise

// =============================================================
// SUPABASE DATA LAYER

// Sign in once at boot; reuse the session supabase-js persists in localStorage.
// If no valid session exists, show a password prompt — nothing is stored in source.
async function signIn() {
  var { data: sessionData } = await db.auth.getSession();
  if (sessionData && sessionData.session) {
    APP.userId = sessionData.session.user.id;
    return;
  }
  // No saved session — prompt for password (runs once per device until session expires)
  return new Promise(function(resolve, reject) {
    var scr = document.getElementById('screen');
    scr.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:32px">'
      + '<i class="ti ti-barbell" style="font-size:40px;color:var(--color-text-tertiary)"></i>'
      + '<p style="font-weight:500;font-size:18px">Lift</p>'
      + '<input id="pwd-input" type="password" placeholder="Password" autocomplete="current-password"'
      + ' style="width:100%;max-width:280px;padding:12px 16px;border-radius:var(--radius-md);'
      + 'border:0.5px solid var(--color-border-md);background:var(--color-bg-secondary);'
      + 'color:var(--color-text);font-size:16px;font-family:inherit;outline:none">'
      + '<p id="pwd-error" style="color:var(--color-text-danger);font-size:13px;min-height:16px"></p>'
      + '<button id="pwd-btn" onclick="doSignIn()" '
      + ' style="width:100%;max-width:280px;padding:14px;border-radius:var(--radius-md);'
      + 'border:none;background:var(--color-text);color:var(--color-bg);font-size:16px;font-weight:500">'
      + 'Sign in</button>'
      + '</div>';

    document.getElementById('pwd-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSignIn();
    });
    setTimeout(function() { document.getElementById('pwd-input').focus(); }, 50);

    window.doSignIn = async function() {
      var pwd = document.getElementById('pwd-input').value;
      var btn = document.getElementById('pwd-btn');
      var err = document.getElementById('pwd-error');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.textContent = '';
      var { data, error } = await db.auth.signInWithPassword({ email: USER_EMAIL, password: pwd });
      if (error) {
        err.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      APP.userId = data.user.id;
      resolve();
    };
  });
}

// Returns local date as YYYY-MM-DD (avoids toISOString() UTC skew)
function localDateStr() {
  var d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

async function loadBootData() {
  // Refresh so midnight crossings pick up the new date without a reload
  APP.today = localDateStr();
  try {
    await signIn();
    var [stateRes, configRes, logRes] = await Promise.all([
      db.from('plan_state').select('*').single(),
      db.from('plan_config').select('*').single(),
      db.from('daily_log').select('*').eq('log_date', APP.today).maybeSingle()
    ]);

    if (stateRes.error)  throw stateRes.error;
    if (configRes.error) throw configRes.error;

    APP.planState  = stateRes.data;
    APP.planConfig = configRes.data;
    APP.todayLog   = logRes.data; // null = not checked in

    // Handle deferred day-advance (set when workout completed, applied next calendar day)
    var pendingRaw = localStorage.getItem('lift_advance_pending');
    if (pendingRaw) {
      try {
        var pending = JSON.parse(pendingRaw);
        if (pending.date === APP.today) {
          // Still the same day — show today's completed state, don't advance yet
          APP.liftCompletedToday = true;
        } else if (pending.date < APP.today) {
          // New day — apply the deferred advance now
          await updatePlanState({ current_gym_day: pending.nextGymDay });
          await advanceCycleDay();
          localStorage.removeItem('lift_advance_pending');
          // APP.planState is updated in-memory by the calls above
        }
      } catch(e) {
        // Corrupted entry — discard it
        localStorage.removeItem('lift_advance_pending');
      }
    }

    // Compute cycle_plan day_number from cursor
    var dayNum = (APP.planState.current_phase - 1) * 8 + APP.planState.current_cycle_day;
    var planRes = await db.from('cycle_plan').select('*').eq('day_number', dayNum).single();
    if (planRes.error) throw planRes.error;
    APP.todayPlan = planRes.data;

    // Load readiness from view
    var readRes = await db.from('v_readiness').select('readiness').maybeSingle();
    APP.readiness = readRes.data ? readRes.data.readiness : null;

    // Load exercises if today is a lift day (which day = independent cursor)
    if (APP.todayPlan.is_lift_day) {
      await loadExercises(APP.planState.current_gym_day);
    }

    render();
  } catch (e) {
    document.getElementById('screen').innerHTML =
      '<div class="loading-wrap"><i class="ti ti-alert-circle" style="font-size:28px;color:var(--color-text-danger)"></i>'
      + '<span>Could not load data</span>'
      + '<span style="font-size:12px;color:var(--color-text-tertiary)">' + e.message + '</span>'
      + '<button onclick="loadBootData()" style="margin-top:8px;padding:10px 24px;border-radius:var(--radius-md);border:0.5px solid var(--color-border-md);background:transparent;font-size:14px;color:var(--color-text)">Retry</button>'
      + '</div>';
  }
}

async function loadExercises(gymDay) {
  var { data, error } = await db
    .from('exercises')
    .select('*, exercise_state(*)')
    .eq('gym_day', gymDay)
    .order('day_order', { ascending: true })
    .order('is_optional', { ascending: true });

  if (error) throw error;
  // Flatten: attach state fields directly for convenience
  APP.exercises = data.map(function(ex) {
    var st = ex.exercise_state && ex.exercise_state[0] ? ex.exercise_state[0] : (ex.exercise_state || {});
    return Object.assign({}, ex, { state: st });
  });
}

async function saveDailyLog(painLevel, jointFullness) {
  var payload = {
    user_id:         APP.userId,   // required for upsert conflict detection
    log_date:        APP.today,
    plan_phase:      APP.planState.current_phase,
    plan_cycle_day:  APP.planState.current_cycle_day,
    knee_pain_level: painLevel,
    joint_fullness:  jointFullness
  };

  var { data, error } = await db
    .from('daily_log')
    .upsert(payload, { onConflict: 'user_id,log_date' })
    .select()
    .single();

  if (error) throw error;
  APP.todayLog = data;
  return data;
}

async function refreshReadiness() {
  var { data } = await db.from('v_readiness').select('readiness').maybeSingle();
  APP.readiness = data ? data.readiness : null;
}

async function loadCalendarData(year, month) {
  var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
  var lastDay = new Date(year, month + 1, 0).getDate();
  var startStr = year + '-' + pad(month + 1) + '-01';
  var endStr   = year + '-' + pad(month + 1) + '-' + pad(lastDay);

  // Next 5 cursor days for the upcoming queue
  var ps = APP.planState;
  var currentDayNum = (ps.current_phase - 1) * 8 + ps.current_cycle_day;
  var upcomingDayNums = [];
  for (var i = 1; i <= 5; i++) {
    upcomingDayNums.push(((currentDayNum - 1 + i) % 24) + 1);
  }

  var [logsRes, sessionsRes, upcomingRes] = await Promise.all([
    db.from('daily_log').select('*').gte('log_date', startStr).lte('log_date', endStr),
    db.from('sessions').select('id,gym_day,created_at,completed_at')
      .gte('completed_at', startStr + 'T00:00:00')
      .lte('completed_at', endStr + 'T23:59:59.999')
      .not('completed_at', 'is', null),
    db.from('cycle_plan').select('*').in('day_number', upcomingDayNums)
  ]);

  APP.calLogs     = logsRes.data     || [];
  APP.calSessions = sessionsRes.data || [];

  // Preserve insertion order matching upcomingDayNums
  var allUpcoming = upcomingRes.data || [];
  APP.calUpcoming = upcomingDayNums.map(function(dn) {
    return allUpcoming.find(function(d) { return d.day_number === dn; });
  }).filter(Boolean);
}

async function createSession(gymDay) {
  var { data, error } = await db
    .from('sessions')
    .insert({ gym_day: gymDay })
    .select()
    .single();
  if (error) throw error;
  APP.sessionId = data.id;
  return data;
}

async function logSessionSet(exerciseId, setNumber, weightLbs, targetReps, actualReps, isBodyweight, status, skipReason) {
  var payload = {
    session_id:  APP.sessionId,
    exercise_id: exerciseId,
    set_number:  setNumber,
    weight_lbs:  isBodyweight ? null : weightLbs,
    target_reps: targetReps,
    actual_reps: status === 'completed' ? actualReps : null,
    set_status:  status,
    skip_reason: skipReason || null
  };
  var { error } = await db.from('session_sets').insert(payload);
  if (error) throw error;
}

async function completeSession() {
  var { error } = await db
    .from('sessions')
    .update({ completed_at: new Date().toISOString() })
    .eq('id', APP.sessionId);
  if (error) throw error;
}

async function updatePlanState(patch) {
  var { error } = await db
    .from('plan_state')
    .update(Object.assign(patch, { updated_at: new Date().toISOString() }))
    .eq('id', APP.planState.id);
  if (error) throw error;
  Object.assign(APP.planState, patch);
}

async function updateExerciseState(exerciseId, patch) {
  var { error } = await db
    .from('exercise_state')
    .update(Object.assign(patch, { updated_at: new Date().toISOString() }))
    .eq('exercise_id', exerciseId);
  if (error) throw error;
}

// =============================================================
// PROGRESSION ENGINE
// =============================================================

// Returns the weight variant ('rep_ladder' or 'classic') based on
// whether the 5-lb increment is >20% of set3 weight.
function progressionVariant(set3Weight) {
  if (!set3Weight || set3Weight === 0) return 'rep_ladder';
  return (5 / set3Weight > 0.20) ? 'rep_ladder' : 'classic';
}

// Target weights for set2/set1 in classic mode
function classicTargets(set3Weight) {
  return {
    target_s2: Math.ceil(set3Weight * 0.9 / 5) * 5,
    target_s1: Math.ceil(set3Weight * 0.8 / 5) * 5
  };
}

// Returns the rep floor for a given set (goal * 0.8, rounded up)
function repFloor(goalReps) {
  return Math.ceil(goalReps * 0.8);
}

// Exercises where the knee is the primary load-bearing joint.
// Under amber readiness, weight advances are suppressed for these only.
var KNEE_LOADING_EXERCISES = [
  'front squat',
  'single-leg bench squat',
  'romanian deadlift',
  'push press'
];

function isKneeLoading(ex) {
  var name = (ex.name || '').toLowerCase();
  return KNEE_LOADING_EXERCISES.some(function(k) { return name.indexOf(k) !== -1; });
}

// Called after all 3 sets of an exercise are logged.
// setsData: [{reps, skipped}, {reps, skipped}, {reps, skipped}] (index 0 = set1)
async function runProgressionEngine(ex, setsData) {
  if (ex.is_optional) return;           // finishers never feed progression
  if (ex.is_bodyweight) return;         // no weight to advance
  if (APP.planConfig.deload_freezes_progression && APP.planState.in_deload) return;

  // Amber readiness: suppress weight advances for knee-loading exercises only.
  // Stall counting still runs so the failure streak isn't lost.
  var amberKneeHold = APP.readiness === 'amber' && isKneeLoading(ex);

  var state = ex.state;
  var goalReps = ex.goal_reps;
  var floor = repFloor(goalReps);
  var ceiling = goalReps + 5;

  // Any skipped set = don't advance, don't count as stall
  var hasSkip = setsData.some(function(s) { return s.skipped; });
  if (hasSkip) return;
  // User must confirm they're ready to progress before any weight advance
  var progressionConfirmed = setsData.some(function(s) { return s.progressionReady; });

  // All reps must be actual (no nulls)
  var reps = setsData.map(function(s) { return s.reps; });
  if (reps.some(function(r) { return r == null; })) return;

  var s1w = state.set1_weight, s2w = state.set2_weight, s3w = state.set3_weight;
  var progState = state.progression_state;
  var failures  = state.consecutive_failures || 0;

  var variant = progressionVariant(s3w);

  // Which set are we evaluating for success?
  // 'ready'         → check set3 reps
  // 'catch_up_set2' → check set2 reps
  // 'catch_up_set1' → check set1 reps
  var evalSetIdx = (progState === 'ready') ? 2 : (progState === 'catch_up_set2') ? 1 : 0;
  var evalReps = reps[evalSetIdx];

  // Success = hit at least goal reps on the evaluated set
  var success = evalReps >= goalReps;
  // Stall = under floor
  var underFloor = evalReps < floor;

  var patch = {};

  if (underFloor) {
    // Count consecutive failures — stall on 2nd
    failures += 1;
    patch.consecutive_failures = failures;
    if (failures >= 2) {
      // Deload: set3 -10%, round to nearest 5
      var newS3 = Math.round((s3w * 0.9) / 5) * 5;
      // Recompute set2/set1 targets after deload
      var deloadedTargets = classicTargets(newS3);
      patch.set3_weight = newS3;
      // Reset to catch_up_set2 so we work back up
      patch.progression_state = 'catch_up_set2';
      // Set2 may now be above or below new target; set to min of current and target
      patch.set2_weight = Math.min(s2w, deloadedTargets.target_s2);
      patch.set1_weight = Math.min(s1w, deloadedTargets.target_s1);
      patch.consecutive_failures = 0;
    }
  } else if (success && progressionConfirmed) {
    if (amberKneeHold) return; // hold flat this session; don't touch state
    failures = 0;
    patch.consecutive_failures = 0;

    if (variant === 'rep_ladder') {
      // Rep-ladder: all sets same weight; on success just stay ready
      // (weight advances are manual for rep-ladder mode — keep as-is,
      //  rep-ladder progression is rep-based not weight-based)
      patch.progression_state = 'ready';
    } else {
      // Classic catch-up state machine
      if (progState === 'ready') {
        // Set3 succeeded — advance set3 by 5, enter catch_up_set2
        patch.set3_weight = s3w + 5;
        patch.progression_state = 'catch_up_set2';
      } else if (progState === 'catch_up_set2') {
        // Set2 caught up — now check if it needs to keep catching up
        var targets2 = classicTargets(s3w);
        if (s2w < targets2.target_s2) {
          // Advance set2 by 5
          patch.set2_weight = Math.min(s2w + 5, targets2.target_s2);
          // If set2 is now at target, move to catch_up_set1
          if (patch.set2_weight >= targets2.target_s2) {
            patch.progression_state = 'catch_up_set1';
          }
        } else {
          // Set2 already at target
          patch.progression_state = 'catch_up_set1';
        }
      } else if (progState === 'catch_up_set1') {
        var targets1 = classicTargets(s3w);
        if (s1w < targets1.target_s1) {
          patch.set1_weight = Math.min(s1w + 5, targets1.target_s1);
          if (patch.set1_weight >= targets1.target_s1) {
            patch.progression_state = 'ready';
          }
        } else {
          patch.progression_state = 'ready';
        }
      }
    }
  } else {
    // Between floor and goal — partial. Reset failure counter (not a stall).
    patch.consecutive_failures = 0;
  }

  if (Object.keys(patch).length > 0) {
    await updateExerciseState(ex.id, patch);
    Object.assign(ex.state, patch);
  }
}

// Returns a human-readable progression hint for the workout screen
function progressionHint(ex) {
  if (ex.is_bodyweight || ex.is_optional) return '';
  var st = ex.state;
  if (!st) return '';
  var variant = progressionVariant(st.set3_weight);

  if (variant === 'rep_ladder') {
    return 'Hit ' + ex.goal_reps + ' reps → you\'ll progress to next weight';
  }
  if (st.progression_state === 'ready') {
    return 'Hit ' + ex.goal_reps + ' reps on all 3 → Set 3 advances to ' + (st.set3_weight + 5) + ' lbs';
  }
  if (st.progression_state === 'catch_up_set2') {
    var t = classicTargets(st.set3_weight);
    return 'Catching up Set 2 → target ' + t.target_s2 + ' lbs';
  }
  if (st.progression_state === 'catch_up_set1') {
    var t2 = classicTargets(st.set3_weight);
    return 'Catching up Set 1 → target ' + t2.target_s1 + ' lbs';
  }
  return '';
}

// =============================================================
// REHAB CURSOR + CYCLE EVALUATION
// =============================================================

async function advanceCycleDay() {
  var ps = APP.planState;
  var pc = APP.planConfig;
  var day = ps.current_cycle_day;

  if (day < 8) {
    await updatePlanState({ current_cycle_day: day + 1 });
  } else {
    // Rolling 8→1: evaluate the completed cycle
    var clean = ps.current_cycle_clean &&
                ps.current_cycle_rest_days <= pc.max_rest_days_per_cycle;

    var patch = {
      current_cycle_day:   1,
      current_cycle_clean: true,
      current_cycle_rest_days: 0
    };

    if (clean) {
      var newClean = ps.clean_cycles_completed + 1;
      patch.clean_cycles_completed = newClean;
      patch.phase_flare_count = 0;
      // Phase advance check
      if (newClean >= pc.clean_cycles_required && ps.current_phase < 3) {
        patch.current_phase = ps.current_phase + 1;
        patch.clean_cycles_completed = 0;
        // Reload the plan for the new phase/day
      }
    } else {
      patch.clean_cycles_completed = 0;
      // Stay in phase
    }

    await updatePlanState(patch);

    // Reload today plan for new cursor position
    var newPhase = APP.planState.current_phase;
    var newDayNum = (newPhase - 1) * 8 + 1;
    var planRes = await db.from('cycle_plan').select('*').eq('day_number', newDayNum).single();
    if (!planRes.error) APP.todayPlan = planRes.data;
  }
}

// =============================================================
// FLARE + DELOAD STATE MACHINE
// =============================================================

async function evaluateFlare(painLevel, jointFullness) {
  var pc = APP.planConfig;
  var ps = APP.planState;

  var isFlare = painLevel >= pc.pain_dirty_threshold || jointFullness === true;
  if (!isFlare) {
    // Check for deload exit
    if (ps.in_deload) {
      var daysSinceDeload = 0;
      if (ps.deload_started_on) {
        var msPerDay = 86400000;
        daysSinceDeload = Math.floor(
          (new Date(APP.today) - new Date(ps.deload_started_on)) / msPerDay
        );
      }
      var canExit = painLevel <= 3 && !jointFullness &&
                    daysSinceDeload >= pc.flare_min_rest_days;
      if (canExit) {
        await updatePlanState({ in_deload: false, deload_started_on: null });
      }
    }
    return;
  }

  // It's a flare
  var patch = {
    current_cycle_clean: false,
    phase_flare_count:   ps.phase_flare_count + 1
  };

  if (!ps.in_deload) {
    patch.in_deload = true;
    patch.deload_started_on = APP.today;
  }

  // Check regression: Nth flare in phase (>= flares_before_regress) and not already in phase 1
  if (patch.phase_flare_count >= pc.flares_before_regress && ps.current_phase > 1) {
    patch.current_phase          = ps.current_phase - 1;
    patch.current_cycle_day      = 1;
    patch.clean_cycles_completed = 0;
    patch.phase_flare_count      = 0;
    patch.current_cycle_clean    = true;
    patch.current_cycle_rest_days = 0;
    patch.in_deload              = true;
    patch.deload_started_on      = APP.today;
  }

  await updatePlanState(patch);

  // Reload plan for potentially new phase/day
  var dayNum = (APP.planState.current_phase - 1) * 8 + APP.planState.current_cycle_day;
  var planRes = await db.from('cycle_plan').select('*').eq('day_number', dayNum).single();
  if (!planRes.error) APP.todayPlan = planRes.data;
}

// Also called when a niggle-skip is logged during a workout
async function markNiggleFlare() {
  var ps = APP.planState;
  if (ps.current_cycle_clean) {
    await updatePlanState({ current_cycle_clean: false });
  }
}

function rehabMatchExercise(label) {
  var s = label.toLowerCase();
  for (var i = 0; i < REHAB_EXERCISES.length; i++) {
    if (REHAB_EXERCISES[i].match(s)) return REHAB_EXERCISES[i];
  }
  // Fallback generic
  return { key: 'generic', type: 'free', label: label, tips: [] };
}

// =============================================================
// RENDER ENGINE
// =============================================================

function render() {
  clearInterval(APP.timerInterval);
  APP.timerInterval = null;

  var html = '';
  switch (APP.screen) {
    case 'today':    html = rToday(); break;
    case 'checkin':  html = rCheckin(); break;
    case 'workout':  html = rWorkout(); break;
    case 'log_set':  html = rLogSet(); break;
    case 'rest':     html = rRest(); break;
    case 'calendar': html = rCalendar(); break;
    case 'rehab':    html = rRehab(); break;
    default:         html = rToday();
  }

  document.getElementById('screen').innerHTML = html;

  if (APP.screen === 'rest' && APP.timerActive) {
    APP.timerInterval = setInterval(function() {
      APP.timerRemaining = Math.max(0, Math.round((APP.timerEndTime - Date.now()) / 1000));
      var el = document.getElementById('tn');
      if (el) el.textContent = fmt(APP.timerRemaining);
      if (APP.timerRemaining <= 0) {
        clearInterval(APP.timerInterval);
        APP.timerInterval = null;
        APP.timerActive = false;
        APP.timerEndTime = null;
        cancelTimerNotification();
        playTimerDone();
        APP.pendingSet = APP.pendingSet + 1;
        APP.pendingReps = APP.exercises[APP.exIndex].goal_reps;
        APP.screen = 'log_set';
        render();
      }
    }, 1000);
  }

  if (APP.screen === 'rehab' && APP.rehabTimerActive) {
    APP.timerInterval = setInterval(function() {
      APP.rehabTimerRemaining--;
      var el = document.getElementById('rehab-timer-display');
      if (el) el.textContent = fmt(APP.rehabTimerRemaining);
      if (APP.rehabTimerRemaining <= 0) {
        clearInterval(APP.timerInterval);
        APP.timerInterval = null;
        APP.rehabTimerActive = false;
        playTimerDone();
        // Mark this set complete and advance
        APP.rehabSetsCompleted[APP.rehabActiveSet] = true;
        var ex = rehabMatchExercise(APP.todayPlan.rehab_exercise);
        var nextSet = APP.rehabActiveSet + 1;
        if (nextSet < ex.sets) {
          APP.rehabActiveSet = nextSet;
          APP.rehabTimerRemaining = ex.duration;
        }
        render();
      }
    }, 1000);
  }
}

function rToday() {
  var ps  = APP.planState;
  var tp  = APP.todayPlan;
  var cfg = APP.planConfig;

  var dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Phase + cycle badge
  var badge = 'Phase ' + ps.current_phase + ' · Day ' + ps.current_cycle_day;
  var badgeStyle = 'font-size:12px;padding:4px 12px;border-radius:var(--radius-md);background:var(--color-bg-info);color:var(--color-text-info);font-weight:500';

  var html = '<div style="padding-top:16px">'
    + '<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:2px">' + dateStr + '</p>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + '<h1 style="font-size:26px">Today</h1>'
    + '<button onclick="goCalendar()" style="border:none;background:transparent;padding:4px;color:var(--color-text-tertiary);font-size:20px;display:flex;align-items:center" aria-label="Calendar"><i class="ti ti-calendar"></i></button>'
    + '</div>'
    + '<span style="' + badgeStyle + '">' + badge + '</span>'
    + '</div>';

  // Deload banner
  if (ps.in_deload) {
    var deloadMsg = 'Deload mode — cap run at ' + cfg.deload_run_mile_cap + ' mi, freeze lifts, skip plyometrics. Keep isometrics &amp; mobility.';
    html += '<div class="deload-banner"><i class="ti ti-alert-triangle" style="margin-right:6px"></i>' + deloadMsg + '</div>';
  }

  // Check-in strip
  html += rCheckinStrip();

  // Readiness badge (only if checked in)
  if (APP.todayLog && APP.readiness) {
    html += rReadinessBadge();
  }

  html += '<div style="height:14px"></div>';

  // Rehab card helpers (used below, possibly before or after run/lift)
  var rehabLabel = tp.rehab_exercise;
  var rehabTiming = tp.rehab_timing.replace(/_/g, ' ');
  var suppressedPlyo = ps.in_deload && cfg.deload_suppress_plyo &&
    rehabLabel.toLowerCase().indexOf('plyo') !== -1;
  if (suppressedPlyo) {
    rehabLabel = '5×45s Isometric Knee Pre-Load (plyo suppressed)';
  }
  var rehabLogged = APP.todayLog && APP.todayLog.rehab_completed;
  var rehabEx = rehabMatchExercise(rehabLabel);
  var rehabSubval = rehabEx.label || null;
  var rehabCard = rRehabCard(rehabLabel, rehabTiming, rehabSubval, rehabLogged);

  var rehabBefore = tp.rehab_timing.indexOf('before') === 0;

  // Rehab first if it comes before run/lift
  if (rehabBefore) html += rehabCard;

  // Run card (if today has a run)
  if (tp.run_miles !== null) {
    var runMiles = (ps.in_deload && tp.run_miles > cfg.deload_run_mile_cap)
      ? cfg.deload_run_mile_cap
      : tp.run_miles;
    var runLabel = runMiles + ' miles';
    if (tp.run_notes) runLabel += ' — ' + tp.run_notes;
    var runLogged = APP.todayLog && APP.todayLog.run_completed;
    html += actCard('ti-run', 'var(--color-bg-info)', 'var(--color-text-info)', 'Run', runLabel,
      tp.target_cadence ? tp.target_cadence + ' spm target' : null, 'toggleRun()', runLogged);
  }

  // Lift card (if today is a lift day)
  if (tp.is_lift_day) {
    var liftNames = APP.exercises
      .filter(function(e) { return !e.is_optional; })
      .map(function(e) { return e.name; });
    html += rLiftCard(ps.current_gym_day, liftNames);
  }

  // Rehab after run/lift if timing is after
  if (!rehabBefore) html += rehabCard;

  // Progress summary
  html += rProgressSummary();

  html += '</div>';
  return html;
}
